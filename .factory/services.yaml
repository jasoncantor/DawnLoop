commands:
  install: >-
    if [ -d "DawnLoop.xcworkspace" ]; then
      xcodebuild -workspace DawnLoop.xcworkspace -scheme DawnLoop -resolvePackageDependencies;
    elif [ -d "DawnLoop.xcodeproj" ]; then
      xcodebuild -project DawnLoop.xcodeproj -resolvePackageDependencies;
    else
      echo "Bootstrap pending: Xcode project not created yet.";
    fi
  build: >-
    SIMULATOR_UDID=$(python3 .factory/resolve_simulator_udid.py) && if [ -d "DawnLoop.xcworkspace" ]; then
      xcodebuild -workspace DawnLoop.xcworkspace -scheme DawnLoop -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" -derivedDataPath .derivedData CODE_SIGNING_ALLOWED=NO build;
    elif [ -d "DawnLoop.xcodeproj" ]; then
      xcodebuild -project DawnLoop.xcodeproj -scheme DawnLoop -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" -derivedDataPath .derivedData CODE_SIGNING_ALLOWED=NO build;
    else
      echo "Bootstrap pending: Xcode project not created yet.";
    fi
  test: >-
    SIMULATOR_UDID=$(python3 .factory/resolve_simulator_udid.py) && if [ -d "DawnLoop.xcworkspace" ]; then
      xcodebuild -workspace DawnLoop.xcworkspace -scheme DawnLoop -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" -derivedDataPath .derivedData CODE_SIGNING_ALLOWED=NO build-for-testing && xcodebuild -workspace DawnLoop.xcworkspace -scheme DawnLoop -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" -derivedDataPath .derivedData CODE_SIGNING_ALLOWED=NO test-without-building -parallel-testing-enabled YES -maximum-parallel-testing-workers 1;
    elif [ -d "DawnLoop.xcodeproj" ]; then
      xcodebuild -project DawnLoop.xcodeproj -scheme DawnLoop -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" -derivedDataPath .derivedData CODE_SIGNING_ALLOWED=NO build-for-testing && xcodebuild -project DawnLoop.xcodeproj -scheme DawnLoop -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" -derivedDataPath .derivedData CODE_SIGNING_ALLOWED=NO test-without-building -parallel-testing-enabled YES -maximum-parallel-testing-workers 1;
    else
      echo "Bootstrap pending: Xcode project not created yet.";
    fi
  planner_tests: >-
    SIMULATOR_UDID=$(python3 .factory/resolve_simulator_udid.py) && if [ -d "DawnLoop.xcworkspace" ]; then
      xcodebuild -workspace DawnLoop.xcworkspace -scheme DawnLoop -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" -derivedDataPath .derivedData CODE_SIGNING_ALLOWED=NO test -parallel-testing-enabled NO -only-testing:DawnLoopTests/WakeAlarmPlannerPreviewTests -only-testing:DawnLoopTests/AutomationServicesTests -only-testing:DawnLoopTests/AlarmEditorValidationTests;
    elif [ -d "DawnLoop.xcodeproj" ]; then
      xcodebuild -project DawnLoop.xcodeproj -scheme DawnLoop -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" -derivedDataPath .derivedData CODE_SIGNING_ALLOWED=NO test -parallel-testing-enabled NO -only-testing:DawnLoopTests/WakeAlarmPlannerPreviewTests -only-testing:DawnLoopTests/AutomationServicesTests -only-testing:DawnLoopTests/AlarmEditorValidationTests;
    else
      echo "Bootstrap pending: Xcode project not created yet.";
    fi
  lint: >-
    if command -v xcrun >/dev/null 2>&1; then
      xcrun swift-format lint -r DawnLoopApp Packages DawnLoopWidgetExtension DawnLoopIntentsExtension DawnLoopTests 2>/dev/null || true;
    else
      echo "xcrun not available";
    fi

services: {}
